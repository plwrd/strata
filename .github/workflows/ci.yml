name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:

env:
  PYTHONUTF8: '1'

jobs:
  python:
    name: Python ${{ matrix.python }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install Qt runtime libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libnss3 libxcomposite1 libxdamage1 libxrandr2 \
            libxkbcommon0 libxtst6 libasound2t64 libgbm1 libxi6

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check app tests scripts

      - name: Format check
        run: ruff format --check app tests scripts

      - name: Type check
        run: mypy app

      - name: Test (unit, integration, security)
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/unit tests/integration tests/security -q

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  e2e:
    name: Desktop shell (e2e)
    needs: [python, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libnss3 libxcomposite1 libxdamage1 libxrandr2 \
            libxkbcommon0 libxtst6 libasound2t64 libgbm1 libxi6

      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      # qwebchannel.js is generated from the installed Qt (it is gitignored and
      # matches the Qt version at runtime), so the Node-only frontend job cannot
      # produce it. Extract it here and place it beside the bundle, where the
      # strata:// scheme handler serves index.html's `<script src="./qwebchannel.js">`.
      - name: Extract the Qt WebChannel client into the bundle
        run: |
          python scripts/sync_qwebchannel.py
          cp frontend/public/qwebchannel.js frontend/dist/qwebchannel.js

      # Loads the real bundle over strata:// inside Qt WebEngine and round-trips a
      # WebChannel call into Python. Without this, "it builds" would be the only
      # thing CI actually proved.
      - name: Run the desktop shell tests
        env:
          QT_QPA_PLATFORM: offscreen
          QTWEBENGINE_CHROMIUM_FLAGS: '--disable-gpu --no-sandbox --in-process-gpu'
        run: pytest tests/e2e -q

  # Scale/latency benchmarks (FR-193). Informational and NOT a required check:
  # shared-runner variance makes hard latency numbers a bad merge gate, but a
  # gross regression still fails, and the printed p95s let a human watch the
  # trend. Runs on pushes to the long-lived branches, not on every PR.
  performance:
    name: Performance at scale
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libnss3 libxkbcommon0 libdbus-1-3 libglib2.0-0t64
      - run: pip install -e ".[dev]"
      - name: Run the 1k/10k performance tiers
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/performance -q -s -m performance

  no-plaintext:
    name: Private storage contains no plaintext
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # Version consistency needs no dependencies (it only reads files), so it
      # runs first and fails fast — the v1.0.1 drift is the reason it exists.
      - run: python scripts/check_version.py
      - run: pip install -e ".[dev]"
      # A guard that must exist before Milestone 3 lands, not after: it is what
      # makes "the disk reveals nothing" a checked claim instead of a promise.
      - run: python scripts/scan_plaintext.py --self-test

  supply-chain:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          pip install -e .
          pip-audit --strict --ignore-vuln GHSA-4xh5-x5gv-qwph || true

      # Advisory, not a merge gate: dependency CVEs are disclosed continuously and
      # independent of any one PR, so a new advisory must not wedge the merge
      # queue. The report still prints. Production-affecting advisories (e.g. the
      # sanitizer) are fixed by bumping the dependency, not by muting this.
      - name: Audit npm dependencies
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high || true

      - name: Generate an SBOM
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment -o sbom-python.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom-python.json
