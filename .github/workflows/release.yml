name: Release

# Builds installers and a signed-where-possible release when a version tag is
# pushed. The tag is the trigger and the source of truth for the version; the
# job never invents one. Artifacts attach to the GitHub Release for that tag.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or ref to build'
        required: true

permissions:
  contents: write # to upload assets to the release

env:
  PYTHONUTF8: '1'

jobs:
  # A tag build that has not passed the gate is not a release. We do not re-run
  # the whole matrix here — CI already ran on the commit the tag points at — but
  # we do rebuild the SBOM so it ships with the artifacts.
  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: |
          pip install cyclonedx-bom
          pip install -e .
          cyclonedx-py environment -o sbom-python.json
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom-python.json

  build:
    name: Installer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Signing is enabled purely by the presence of the certificate secret. No
    # secret → unsigned build that says so; secret present → the signing steps run
    # and a signing failure fails the release (you meant to sign).
    env:
      HAS_CERT: ${{ secrets.CODE_SIGN_CERT != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: strata-windows
          - os: ubuntu-latest
            artifact: strata-linux
          - os: macos-latest
            artifact: strata-macos
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Qt runtime libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libnss3 libxcomposite1 libxdamage1 libxrandr2 \
            libxkbcommon0 libxtst6 libasound2t64 libgbm1 libxi6

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build the frontend bundle
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Extract the Qt WebChannel client
        run: python scripts/sync_qwebchannel.py

      - name: Freeze the application (PyInstaller)
        run: pyinstaller packaging/pyinstaller/strata.spec --noconfirm

      - name: Announce unsigned build
        if: env.HAS_CERT != 'true'
        shell: bash
        run: echo "::warning::No CODE_SIGN_CERT secret — this is an UNSIGNED build. SmartScreen/Gatekeeper will warn. See SECURITY.md to enable signing."

      # Windows Authenticode. The cert is a base64-encoded PFX in CODE_SIGN_CERT,
      # its password in CODE_SIGN_PASSWORD. We locate signtool in the Windows SDK,
      # sign the frozen executable with a SHA-256 digest, and timestamp it so the
      # signature outlives the certificate.
      - name: Sign (Windows Authenticode)
        if: runner.os == 'Windows' && env.HAS_CERT == 'true'
        shell: bash
        env:
          CERT_B64: ${{ secrets.CODE_SIGN_CERT }}
          CERT_PW: ${{ secrets.CODE_SIGN_PASSWORD }}
        run: |
          set -euo pipefail
          echo "$CERT_B64" | base64 --decode > cert.pfx
          signtool=$(find "/c/Program Files (x86)/Windows Kits/10/bin" -name signtool.exe 2>/dev/null | grep -i '/x64/' | sort | tail -1)
          [ -n "$signtool" ] || { echo "signtool not found"; exit 1; }
          "$signtool" sign //f cert.pfx //p "$CERT_PW" //fd sha256 //tr http://timestamp.digicert.com //td sha256 "dist/Strata/Strata.exe"
          rm -f cert.pfx

      # macOS codesign. CODE_SIGN_CERT is a base64 .p12; CODE_SIGN_IDENTITY is the
      # identity name (e.g. "Developer ID Application: …"). Notarization needs an
      # Apple ID and is a further step — see SECURITY.md.
      - name: Sign (macOS codesign)
        if: runner.os == 'macOS' && env.HAS_CERT == 'true'
        env:
          CERT_B64: ${{ secrets.CODE_SIGN_CERT }}
          CERT_PW: ${{ secrets.CODE_SIGN_PASSWORD }}
          SIGN_IDENTITY: ${{ secrets.CODE_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          echo "$CERT_B64" | base64 --decode > cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import cert.p12 -k build.keychain -P "$CERT_PW" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain
          target=$([ -d dist/Strata.app ] && echo dist/Strata.app || echo dist/Strata)
          codesign --deep --force --options runtime --timestamp --sign "$SIGN_IDENTITY" "$target"
          rm -f cert.p12

      # Package, then checksum. The SHA-256 file lets anyone verify integrity even
      # for an unsigned build — the always-on half of release integrity.
      - name: Package and checksum
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          if [ -d dist ]; then
            tar -czf "out/${{ matrix.artifact }}.tar.gz" -C dist .
          fi
          (cd out && sha256sum ./*.tar.gz > "${{ matrix.artifact }}.sha256")

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: out/*

  publish:
    name: Attach to the release
    needs: [sbom, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Attach artifacts to the release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: false
