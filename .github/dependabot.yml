version: 2

# Security updates only.
#
# Routine version updates are deliberately OFF (`open-pull-requests-limit: 0`
# disables version PRs; Dependabot still opens PRs for *security advisories*,
# which ignore that limit). The stack was modernised as one verified set in
# v1.3.0, and the weekly stream of version-bump branches was noise: majors need
# a human decision and code adaptation, and grouped minors are better batched
# deliberately per release than trickled continuously.
#
# To modernise again: batch the updates on one branch, verify the full gate
# locally, and land it as a single reviewed PR (see #40 for the pattern) — or
# temporarily raise these limits.
updates:
  - package-ecosystem: pip
    directory: '/'
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 0

  - package-ecosystem: npm
    directory: '/frontend'
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 0

  - package-ecosystem: github-actions
    directory: '/'
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
